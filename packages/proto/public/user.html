<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8"/>
        <title>User Page</title>
        <link rel="stylesheet" href="/styles/reset.css"/>
        <link rel="stylesheet" href="/styles/tokens.css"/>
        <link rel="stylesheet" href="/styles/page.css"/>
        <link rel="stylesheet" href="/styles/user.css"/>
        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Almendra:ital,wght@0,400;0,700;1,400;1,700&family=Josefin+Slab:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
        <!-- Favicon -->
        <link rel="apple-touch-icon" sizes="180x180" href="/icons/favicon/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon/favicon-16x16.png">
        <link rel="manifest" href="/icons/favicon/site.webmanifest">
    </head>
    <body>
        <div class="page">
            <div class="header">
                <div class="header-left">
                    <svg class="icon-logo">
                        <use href="icons/planning.svg#icon-spiral-main"/>
                    </svg>
                    <h1>Momentum</h1>
                </div>
                <div class="header-right">
                    <label id="dark-mode-holder">
                        <input id="dark-mode-toggle" type="checkbox" autocomplete="off"/>
                        Dark Mode
                    </label>
                    <a href="index.html">Home</a>
                    <a href="" class="disabled">About</a>
                    <a href="" class="disabled">Contact</a>
                    <a href="user.html">
                        <svg class="icon-logo">
                            <use href="icons/planning.svg#icon-user-profile"/>
                        </svg>
                    </a>
                </div>
            </div>
            <div class="user-info border-small">
                <h2>User Info</h2>
                <div class="user-info-container">
                    <!-- Account Section -->
                    <div class="user-section">
                        <h3>Account</h3>
                        <div class="user-section-body">
                            <div class="field">
                                <label for="display-name">Display Name:</label>
                                <input id="display-name" type="text" name="display-name" value="Current Name">
                            </div>

                            <div class="field">
                                <label for="username">Username:</label>
                                <input id="username" type="text" name="username" value="Current Username">
                            </div>

                            <div class="field">
                                <label for="profile-picture">Change Profile Picture:</label>
                                <input id="profile-picture" type="file" name="profile-picture">
                            </div>
                        </div>
                    </div>
                    
                    <!-- Password Section -->
                    <div class="user-section">
                        <h3>Security</h3>
                        <div class="user-section-body">
                            <div class="field">
                                <label for="current-password">Current Password:</label>
                                <input id="current-password" type="password" name="current-password">
                            </div>

                            <div class="field">
                                <label for="new-password">New Password:</label>
                                <input id="new-password" type="password" name="new-password">
                            </div>

                            <div class="field">
                                <label for="confirm-password">Confirm New Password:</label>
                                <input id="confirm-password" type="password" name="confirm-password">
                                <button type="button">Change Password</button>
                            </div>

                        </div>
                    </div>

                    <!-- Stats Section -->
                    <div class="user-section">
                        <h3>Stats</h3>
                        <div class="user-section-body stats-list">
                            <div class="stat-row">Tasks Completed This Week: 12</div>
                            <div class="stat-row">Current Streak: 5 days</div>
                            <div class="stat-row">Overdue Tasks: 2</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="profile-picture-holder border-small">
                <img src="/images/default-profile.jpg">
            </div>
            <!-- <div class="event-container border-small">
                <p> contents </p>
            </div> -->
        </div>
        <script src="/javascript/main.js"></script>
    </body>
</html>
