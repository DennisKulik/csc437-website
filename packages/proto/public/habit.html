<!DOCTYPE html>
<html lang="en">

    <body>
        <div class="header">
            <div class="header-left">
                <svg class="icon-logo">
                    <use href="icons/planning.svg#icon-spiral-main"/>

                <h1>Momentum</h1>
            </div>
            <div class="header-right">
                <label id="dark-mode-holder">
                    <input id="dark-mode-toggle" type="checkbox" autocomplete="off"/>

                <a href="index.html">Home</a>
                <a href="" class="disabled">About</a>
                <a href="" class="disabled">Contact</a>

        <p>Category: Personal</p>
        <p>Description: Go to the gym</p>
        <p>Frequency: 4 times a week</p>
        <p>Priority: Medium</p>
        <p>Streak: 2</p>
        <p>Useless checklist that doesn't save after you refresh:</p>
        <ul>
            <li><label><input type="checkbox"> Sunday</label></li>
            <li><label><input type="checkbox"> Monday</label></li>
            <li><label><input type="checkbox"> Tuesday</label></li>
            <li><label><input type="checkbox"> Wednesday</label></li>
            <li><label><input type="checkbox"> Thursday</label></li>
            <li><label><input type="checkbox"> Friday</label></li>
            <li><label><input type="checkbox"> Saturday</label></li>
        </ul>
